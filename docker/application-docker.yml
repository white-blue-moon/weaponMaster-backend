# Docker 컨테이너 실행용 설정
# 모든 값은 환경변수로 재정의 가능 (docker-compose.yml 참고)
server:
  port: 7070

spring:
  application:
    name: weaponMaster-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/weaponMaster}
    username: ${DB_USERNAME:weapon}
    password: ${DB_PASSWORD:weapon1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

# 네오플 오픈 API 키 (환경변수 NEOPLE_API_KEY 로 주입)
neople:
  api:
    key: ${NEOPLE_API_KEY:}

cors:
  allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}

weapon-master:
  url: ${WEAPON_MASTER_URL:http://localhost:8080/weapon-front}
